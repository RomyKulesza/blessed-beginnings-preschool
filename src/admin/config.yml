backend:
  name: git-gateway
  branch: main

# Where uploaded photos are stored, and the URL they are served from
media_folder: "src/assets/images"
public_folder: "/assets/images"

site_url: /
display_url: /
publish_mode: simple

collections:
  - name: pages
    label: "Website Pages"
    description: "Edit the text and photos on each page. Click Publish to make changes live."
    files:
      - name: home
        label: "Home Page"
        file: "src/_data/home.json"
        fields:
          - { label: "Hero heading", name: heroTitle, widget: string }
          - { label: "Hero subtitle", name: heroSubtitle, widget: text }
          - { label: "Hero photo", name: heroImage, widget: image }
          - { label: "Button text", name: ctaLabel, widget: string }
          - { label: "Button link", name: ctaUrl, widget: string, hint: "e.g. /contact/" }
          - { label: "Welcome heading", name: welcomeHeading, widget: string }
          - { label: "Welcome text", name: welcomeBody, widget: text, hint: "Leave a blank line between paragraphs." }
          - { label: "Welcome photo", name: welcomeImage, widget: image }
          - { label: "Virtual tour heading", name: tourHeading, widget: string, required: false }
          - { label: "Virtual tour text", name: tourText, widget: text, required: false }
          - { label: "Virtual tour video embed URL", name: tourVideo, widget: string, required: false, hint: "Google Drive: use the /preview link. Leave blank to hide the tour section." }
          - label: "Highlight cards"
            name: highlights
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
      - name: mission
        label: "Our Mission Page"
        file: "src/_data/mission.json"
        fields:
          - { label: "Page heading", name: heading, widget: string }
          - { label: "Photo", name: image, widget: image }
          - { label: "Intro", name: intro, widget: text }
          - { label: "Body text", name: body, widget: text, hint: "Leave a blank line between paragraphs." }
      - name: staff
        label: "Our Staff Page"
        file: "src/_data/staff.json"
        fields:
          - { label: "Page heading", name: heading, widget: string }
          - { label: "Administration heading", name: adminHeading, widget: string }
          - { label: "Administration text", name: adminBody, widget: text }
          - { label: "Teachers heading", name: staffHeading, widget: string }
          - { label: "Teachers text", name: staffBody, widget: text }
          - label: "Staff members"
            name: team
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Photo, name: photo, widget: image }
              - { label: Bio, name: bio, widget: text }
      - name: program
        label: "Our Program Page"
        file: "src/_data/program.json"
        fields:
          - { label: "Page heading", name: heading, widget: string }
          - { label: "Photo", name: image, widget: image }
          - { label: "Intro", name: intro, widget: text }
          - { label: "Schedules text", name: schedules, widget: text, hint: "Leave a blank line between paragraphs." }
          - { label: "Goals heading", name: goalsHeading, widget: string }
          - label: "Goals"
            name: goals
            widget: list
            field: { label: Goal, name: goal, widget: string }
          - { label: "Curriculum heading", name: curriculumHeading, widget: string }
          - { label: "Curriculum text", name: curriculumBody, widget: text, hint: "Leave a blank line between paragraphs." }
          - { label: "What makes us different heading", name: differentHeading, widget: string }
          - label: "What makes us different"
            name: different
            widget: list
            field: { label: Point, name: point, widget: string }
      - name: ourday
        label: "Our Day Page"
        file: "src/_data/ourday.json"
        fields:
          - { label: "Page heading", name: heading, widget: string }
          - { label: "Photo", name: image, widget: image }
          - { label: "Intro", name: intro, widget: text }
          - label: "Daily schedule"
            name: schedule
            widget: list
            fields:
              - { label: Time, name: time, widget: string }
              - { label: Activity, name: activity, widget: string }
              - { label: Description, name: description, widget: text }
          - { label: "Footnote", name: note, widget: string, required: false }
      - name: contact
        label: "Contact Page"
        file: "src/_data/contact.json"
        fields:
          - { label: "Page heading", name: heading, widget: string }
          - { label: "Intro", name: intro, widget: text }
          - { label: "Phone", name: phone, widget: string }
          - { label: "Email", name: email, widget: string, required: false }
          - { label: "Address line 1", name: addressLine1, widget: string }
          - { label: "Address line 2", name: addressLine2, widget: string }
          - { label: "Location note", name: location, widget: string }
          - { label: "Map embed URL", name: mapEmbed, widget: string, required: false }
          - { label: "Enrollment heading", name: enrollmentHeading, widget: string }
          - { label: "Enrollment text", name: enrollmentBody, widget: text, hint: "Leave a blank line between paragraphs." }
      - name: site
        label: "Site Settings (name, phone, menu)"
        file: "src/_data/site.json"
        fields:
          - { label: "Preschool name", name: name, widget: string }
          - { label: "Logo", name: logo, widget: image, required: false }
          - { label: "Tagline", name: tagline, widget: string }
          - { label: "Phone", name: phone, widget: string }
          - { label: "Email", name: email, widget: string, required: false }
          - { label: "Address line 1", name: addressLine1, widget: string }
          - { label: "Address line 2", name: addressLine2, widget: string }
          - { label: "Location note", name: location, widget: string }
          - { label: "Accreditation line", name: accreditation, widget: string }
          - label: "Navigation menu"
            name: nav
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: url, widget: string }
      - name: theme
        label: "Design — Colors & Fonts"
        file: "src/_data/theme.json"
        description: "Change the whole site's look. Colors update everywhere; fonts change all headings and text."
        fields:
          - { label: "Main color (buttons & links)", name: primary, widget: color }
          - { label: "Text color", name: text, widget: color }
          - { label: "Page background color", name: background, widget: color }
          - { label: "Rainbow — Red", name: red, widget: color }
          - { label: "Rainbow — Orange", name: orange, widget: color }
          - { label: "Rainbow — Yellow", name: yellow, widget: color }
          - { label: "Rainbow — Green", name: green, widget: color }
          - { label: "Rainbow — Blue", name: blue, widget: color }
          - { label: "Rainbow — Purple", name: purple, widget: color }
          - { label: "Heading font", name: headingFont, widget: select, options: ["Fredoka", "Baloo 2", "Quicksand", "Poppins", "Nunito", "Comfortaa"], default: "Fredoka" }
          - { label: "Body font", name: bodyFont, widget: select, options: ["Nunito Sans", "Nunito", "Open Sans", "Lato", "Poppins", "Mulish"], default: "Nunito Sans" }
      - name: screens
        label: "Loading & Error Screens"
        file: "src/_data/screens.json"
        description: "The loading screen shown while pages open, and the friendly 'page not found' screen. (The logo on both comes from Site Settings → Logo.)"
        fields:
          - { label: "Loading screen message (optional)", name: loaderMessage, widget: string, required: false, hint: "Leave blank to show just the logo and dots." }
          - { label: "'Page not found' heading", name: notFoundHeading, widget: string }
          - { label: "'Page not found' message", name: notFoundMessage, widget: text }
          - { label: "'Page not found' button text", name: notFoundButton, widget: string }
          - { label: "'Page not found' button link", name: notFoundButtonUrl, widget: string, default: "/" }

  - name: newpages
    label: "Add / Edit Pages"
    label_singular: "Page"
    description: "Create brand-new pages and build them from sections. Turn on 'Show in menu' and it appears in the top navigation automatically."
    folder: "src/pages"
    create: true
    delete: true
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Page title", name: title, widget: string }
      - { label: "Subtitle (optional)", name: subtitle, widget: string, required: false }
      - label: "Header color"
        name: heroColor
        widget: select
        default: blue
        options: ["red", "orange", "yellow", "green", "blue", "purple"]
      - { label: "Show in top menu?", name: showInNav, widget: boolean, default: true }
      - { label: "Menu label (optional)", name: navLabel, widget: string, required: false, hint: "Defaults to the page title." }
      - { label: "Menu order (lower shows first)", name: navOrder, widget: number, required: false, default: 10 }
      - label: "Sections (add, remove, or drag to reorder)"
        name: blocks
        label_singular: "Section"
        widget: list
        types:
          - label: "Heading"
            name: heading
            widget: object
            fields:
              - { label: Text, name: text, widget: string }
              - { label: Align, name: align, widget: select, options: ["left", "center"], default: "left" }
          - label: "Text"
            name: text
            widget: object
            fields:
              - { label: Body, name: body, widget: markdown }
          - label: "Image"
            name: image
            widget: object
            fields:
              - { label: Image, name: image, widget: image }
              - { label: "Describe the image (for accessibility)", name: alt, widget: string, required: false }
              - { label: Caption, name: caption, widget: string, required: false }
              - { label: Width, name: width, widget: select, options: ["normal", "full"], default: "normal" }
          - label: "Image + Text (side by side)"
            name: imageText
            widget: object
            fields:
              - { label: Image, name: image, widget: image }
              - { label: "Describe the image", name: alt, widget: string, required: false }
              - { label: "Image on which side?", name: imageSide, widget: select, options: ["left", "right"], default: "left" }
              - { label: Heading, name: heading, widget: string, required: false }
              - { label: Body, name: body, widget: markdown }
          - label: "Photo Gallery"
            name: gallery
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string, required: false }
              - label: Photos
                name: images
                widget: list
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: "Describe the image", name: alt, widget: string, required: false }
                  - { label: Caption, name: caption, widget: string, required: false }
          - label: "Info Cards"
            name: cards
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string, required: false }
              - { label: Columns, name: columns, widget: select, options: ["2", "3"], default: "3" }
              - label: Cards
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: text }
          - label: "Video"
            name: video
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string, required: false }
              - { label: Text, name: text, widget: text, required: false }
              - { label: "Video link (Google Drive /preview or YouTube embed)", name: embedUrl, widget: string }
          - label: "Buttons"
            name: buttons
            widget: object
            fields:
              - { label: Align, name: align, widget: select, options: ["flex-start", "center", "flex-end"], default: "flex-start" }
              - label: Buttons
                name: items
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: url, widget: string }
                  - { label: Style, name: style, widget: select, options: ["primary", "light"], default: "primary" }
          - label: "Color Banner (call to action)"
            name: banner
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Color, name: color, widget: select, options: ["red", "orange", "yellow", "green", "blue", "purple"], default: "green" }
              - { label: "Button label", name: buttonLabel, widget: string, required: false }
              - { label: "Button link", name: buttonUrl, widget: string, required: false }
